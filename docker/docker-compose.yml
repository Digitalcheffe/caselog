services:
  caselog:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: caselog
    restart: unless-stopped
    environment:
      - CASELOG_PORT=${CASELOG_PORT:-5000}
      - CASELOG_DB_PATH=/data/caselog.db
    ports:
      - "${CASELOG_PORT:-5000}:${CASELOG_PORT:-5000}"
    volumes:
      - ${HOST_PATH}:/data

volumes:
  caselog-data:
